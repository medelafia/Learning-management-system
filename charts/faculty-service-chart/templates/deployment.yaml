apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "faculty-chart.fullname" . }}
  labels:
    {{- include "faculty-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "faculty-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "faculty-chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "faculty-chart.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env: 
            - name: CONFIG_SERVER_HOST
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: CONFIG_SERVER_HOST
            - name: EUREKA_HOST
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: EUREKA_HOST
            - name: SECRET_TOKEN
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: SECRET_TOKEN
            - name: FACULTY_DB_HOST
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: FACULTY_DB_HOST
            - name: FACULTY_DB_PORT
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: FACULTY_DB_PORT
            - name: FACULTY_DB_USERNAME
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: FACULTY_DB_USERNAME
            - name: FACULTY_DB_PASSWORD
              valueFrom: 
                secretKeyRef: 
                  name: faculty-service-secret
                  key: FACULTY_DB_PASSWORD
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
