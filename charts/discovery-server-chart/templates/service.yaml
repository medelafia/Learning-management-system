apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  labels:
    {{- include "discovery-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "discovery-chart.selectorLabels" . | nindent 4 }}
